   name: Daily Scorebing Analysis

   on:
     schedule:
    # Запуск каждый день в 20:00 UTC (анализ на завтра)
         - cron: '0 20 * * *'
    workflow_dispatch:

   jobs:
     analyze:
       runs-on: ubuntu-latest
       steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Set up Python
           uses: actions/setup-python@v5
           with:
             python-version: '3.10'

         - name: Install dependencies
           run: |
             python -m pip install --upgrade pip
             pip install -r requirements.txt

         - name: Run analyzer
           run: python main.py

         - name: Upload results as artifact
           uses: actions/upload-artifact@v4
           with:
              name: analytical-report
              path: |
                data/*.json
                data/*.txt
              retention-days: 7
